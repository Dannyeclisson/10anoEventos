spring:
  datasource:
    url: jdbc:h2:mem:eventos_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret: segredo-de-teste-com-tamanho-suficiente
    expiration-ms: 86400000
  auth:
    cookie-name: AUTH_TOKEN
    cookie-secure: false
    cookie-same-site: Lax
