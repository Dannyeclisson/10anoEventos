<section class="login-page">
  <div class="page-container">
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Entrar</mat-card-title>
        <mat-card-subtitle>Acesse sua sessao com email e senha</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email">
            @if (form.controls.email.hasError('required')) {
              <mat-error>Email obrigatorio</mat-error>
            } @else if (form.controls.email.hasError('email')) {
              <mat-error>Email invalido</mat-error>
            }
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Senha</mat-label>
            <input matInput type="password" formControlName="senha" autocomplete="current-password">
            @if (form.controls.senha.hasError('required')) {
              <mat-error>Senha obrigatoria</mat-error>
            }
          </mat-form-field>

          <button mat-flat-button type="submit" [disabled]="loading">
            @if (loading) {
              <mat-spinner diameter="18" />
            } @else {
              <mat-icon>login</mat-icon>
            }
            Entrar
          </button>
        </form>
      </mat-card-content>

      <mat-card-actions>
        <a mat-button routerLink="/cadastro-usuario">Criar cadastro</a>
      </mat-card-actions>
    </mat-card>
  </div>
</section>
